<!DOCTYPE html>
<html>
<head>
  <title>Talko</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
  body { font-family: Arial; max-width: 700px; margin: 40px auto; background: #f0ebe3; }
  h2 { color: #a0522d; }
  #messages { background: #fff8f2; border: 1px solid #d4b8a0; height: 350px; overflow-y: auto; padding: 10px; margin-bottom: 5px; border-radius: 8px; }
  .message { margin: 8px 0; }
  .message.me span.name { color: #6b8e5a; }
  .message span.name { font-weight: bold; color: #a0522d; }
  .timestamp { font-size: 11px; color: #b0a090; margin-left: 8px; }
  #typing { font-size: 12px; color: #b0a090; height: 18px; margin-bottom: 5px; }
  input { padding: 8px; border: 1px solid #d4b8a0; border-radius: 4px; background: #fdf6f0; }
  button { padding: 8px 16px; background: #a0522d; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #8b4513; }
  #status { font-size: 12px; margin-bottom: 10px; }
  .connected { color: #6b8e5a; }
  .disconnected { color: #b85450; }
  .nav { display: flex; justify-content: space-between; align-items: center; }
  .logout { background: #b85450; padding: 6px 12px; font-size: 13px; }
  .logout:hover { background: #963f3c; }
  .message.me {
    text-align: right;
    background: #f5ede6;
    border-radius: 8px;
    padding: 4px 8px;
  }
  .message.me span.name {
    color: #6b8e5a;
  }
</style>
</head>
<body>
  <div class="nav">
  <h2>Chat</h2>
  <div>
    <a href="/friends.html" style="margin-right:10px; color:#a0522d">Friends</a>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

  <div id="status" class="disconnected">Disconnected</div>
  <p id="chatWith" style="color:#7a6555; font-size:14px"></p>
  <div id="messages"></div>
  <div id="typing"></div>
  <input id="content" placeholder="Type a message..." style="width:75%"
    onkeydown="if(event.key==='Enter') sendMessage()"
    oninput="sendTyping()" />
  <button onclick="sendMessage()">Send</button>

  <script>
    let stompClient = null;
    let currentUser = null;
    let friendUsername = null;
    let typingTimeout = null;

    // Get friend from URL e.g. /index.html?friend=john
    const params = new URLSearchParams(window.location.search);
    friendUsername = params.get('friend');

    async function init() {
      const res = await fetch('/api/auth/me');
      if (!res.ok) { window.location.href = '/login.html'; return; }
      const data = await res.json();
      currentUser = data.username;

      if (friendUsername) {
        document.getElementById('chatWith').textContent = `Chatting with: ${friendUsername}`;
        loadHistory();
      } else {
        document.getElementById('chatWith').textContent = 'Select a friend to chat. Go to Friends page.';
      }

      connect();
    }

    function connect() {
      const socket = new SockJS('/ws');
      stompClient = Stomp.over(socket);
      stompClient.debug = null;

      stompClient.connect({}, function () {
        document.getElementById('status').innerHTML = 'Connected';
        document.getElementById('status').className = 'connected';

        // Receive messages
        stompClient.subscribe(`/user/queue/messages`, function (msg) {
          const data = JSON.parse(msg.body);
          // Only append if it's from the friend (sender already sees it instantly)
          if (data.sender !== currentUser) {
            appendMessage(data.sender, data.content, false);
          }
        });

        // Receive typing indicator
        stompClient.subscribe(`/user/queue/typing`, function (msg) {
          const data = JSON.parse(msg.body);
          if (data.username === friendUsername) {
            document.getElementById('typing').textContent =
              data.typing === 'true' ? `${friendUsername} is typing...` : '';
          }
        });
      });
    }

    function sendMessage() {
      if (!friendUsername || !stompClient) return;
      const content = document.getElementById('content').value.trim();
      if (!content) return;

      // Show sender's own message instantly on their screen
      appendMessage('You', content, true);

      stompClient.send('/app/chat', {}, JSON.stringify({
        receiver: friendUsername,
        content: content
      }));

  document.getElementById('content').value = '';
  sendTypingStop();
}
    async function loadHistory() {
      const res = await fetch(`/api/messages/${friendUsername}`);
      if (!res.ok) return;
      const messages = await res.json();
      messages.forEach(m => appendMessage(m.sender.username, m.content, m.sender.username === currentUser));
    }

    function appendMessage(sender, content, isMe) {
      const div = document.getElementById('messages');
      const time = new Date().toLocaleTimeString();
      div.innerHTML += `<div class="message ${isMe ? 'me' : ''}">
        <span class="name">${isMe ? 'You' : sender}</span>: ${content}
        <span class="timestamp">${time}</span>
      </div>`;
      div.scrollTop = div.scrollHeight;
    }

    function sendTyping() {
      if (!friendUsername || !stompClient) return;
      stompClient.send('/app/typing', {}, JSON.stringify({
        receiver: friendUsername,
        typing: 'true'
      }));

      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(sendTypingStop, 2000);
    }

    function sendTypingStop() {
      if (!friendUsername || !stompClient) return;
      stompClient.send('/app/typing', {}, JSON.stringify({
        receiver: friendUsername,
        typing: 'false'
      }));
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }

    init();
  </script>
</body>
</html>
